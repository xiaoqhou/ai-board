<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bouncing Ball</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  overflow: hidden;
}
canvas { border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
</style>
</head>
<body>
<canvas id="c" width="600" height="400"></canvas>
<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");
let x = 300, y = 200, vx = 5, vy = 4, r = 25;
const colors = ["#ff6b6b","#feca57","#48dbfb","#ff9ff3","#1dd1a1","#ff9f43"];
let colorIdx = 0;

function draw() {
  ctx.clearRect(0,0,600,400);
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  const g = ctx.createRadialGradient(x-r/3,y-r/3,0,x,y,r);
  g.addColorStop(0,"#fff");
  g.addColorStop(0.4, colors[colorIdx]);
  g.addColorStop(1,"rgba(0,0,0,0.3)");
  ctx.fillStyle = g;
  ctx.fill();
  ctx.closePath();
}
function update() {
  x += vx; y += vy;
  if(x<=r||x>=600-r){vx=-vx;colorIdx=(colorIdx+1)%colors.length}
  if(y<=r||y>=400-r){vy=-vy;colorIdx=(colorIdx+1)%colors.length}
}
(function loop() {
  update(); draw();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
