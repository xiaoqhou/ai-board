<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#121212">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Camera OCR → TTS</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>📷 OCR → 🗣️ TTS</h1>
      <p class="subtitle">Point, capture, listen</p>
    </header>

    <main>
      <div id="camera-section">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" hidden></canvas>
        <div id="camera-controls">
          <button id="capture-btn" class="btn primary">Capture & OCR</button>
          <button id="switch-camera-btn" class="btn secondary">🔄 Switch Camera</button>
        </div>
      </div>

      <div id="result-section" hidden>
        <div id="ocr-result">
          <h3>Recognized Text</h3>
          <p id="ocr-text" class="ocr-text"></p>
        </div>
        <div id="tts-controls">
          <button id="speak-btn" class="btn primary">🔊 Speak</button>
          <button id="stop-btn" class="btn secondary">⏹️ Stop</button>
          <div id="voice-controls">
            <label for="rate">Speed: <span id="rate-value">1.0</span></label>
            <input type="range" id="rate" min="0.5" max="2.0" step="0.1" value="1.0">
            <label for="pitch">Pitch: <span id="pitch-value">1.0</span></label>
            <input type="range" id="pitch" min="0.5" max="2.0" step="0.1" value="1.0">
          </div>
        </div>
      </div>

      <div id="loading-overlay" hidden>
        <div class="spinner"></div>
        <p id="loading-text">Processing...</p>
      </div>

      <div id="error-toast" hidden></div>
    </main>

    <footer>
      <p>Camera OCR → TTS · Works offline after first load</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
