<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Camera OCR → TTS</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#121212;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
#app{display:flex;flex-direction:column;height:100%;max-width:600px;margin:0 auto;width:100%}
header{padding:12px 16px;text-align:center;font-size:18px;font-weight:600;background:#1e1e1e;border-bottom:1px solid #333;flex-shrink:0}
#bar{height:3px;background:#333;flex-shrink:0}
#fill{height:100%;background:#4caf50;width:0;transition:width .3s}
#view{position:relative;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;flex:1;min-height:0}
#view video,#view canvas{width:100%;height:100%;object-fit:contain}
#view .ph{text-align:center;color:#666;padding:20px}
#view .ph .ic{font-size:64px;margin-bottom:12px;display:block}
#result{display:none;flex-direction:column;overflow:hidden;min-height:0}
#result.show{display:flex;flex:1}
#result .list{flex:1;overflow-y:auto;padding:12px 16px;-webkit-overflow-scrolling:touch}
#result .list .row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #2a2a2a;line-height:1.6;font-size:16px}
#result .list .row:last-child{border-bottom:none}
#result .list .row .idx{width:26px;height:26px;line-height:26px;text-align:center;border-radius:50%;background:#43a047;color:#fff;font-size:13px;font-weight:700;flex-shrink:0;margin-top:2px}
#status{padding:6px 16px;font-size:13px;color:#888;min-height:28px;background:#1e1e1e;text-align:center;flex-shrink:0}
#ctrl{padding:10px 16px;background:#1e1e1e;border-top:1px solid #333;display:flex;gap:10px;flex-shrink:0}
#ctrl button{flex:1;height:52px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none}
#ctrl button:disabled{opacity:.35;pointer-events:none}
.b-c{background:#1976d2;color:#fff}
.b-s{background:#e53935;color:#fff}
.b-t{background:#43a047;color:#fff}
.hide{display:none!important}
</style>
</head>
<body>
<div id="app">
<header>Camera OCR → TTS</header>
<div id="bar"><div id="fill"></div></div>
<div id="view">
<video id="video" autoplay playsinline class="hide"></video>
<canvas id="canvas" class="hide"></canvas>
<div class="ph" id="ph"><span class="ic">📷</span>Tap <strong>Capture</strong> to open camera</div>
</div>
<div id="result"><div class="list" id="list"></div></div>
<div id="status">Ready</div>
<div id="ctrl">
<button class="b-c" id="btnC">📷 Capture</button>
<button class="b-s hide" id="btnS">⏺ Snap</button>
<button class="b-t hide" id="btnT">🔊 Speak</button>
</div>
</div>
<script>
const video=document.getElementById('video'),canvas=document.getElementById('canvas'),ph=document.getElementById('ph'),fill=document.getElementById('fill'),st=document.getElementById('status'),list=document.getElementById('list'),$result=document.getElementById('result'),btnC=document.getElementById('btnC'),btnS=document.getElementById('btnS'),btnT=document.getElementById('btnT'),$app=document.getElementById('app');
let stream=null,sentences=[],speaking=false,worker=null;

async function getWorker(){
if(typeof Tesseract==='undefined')throw Error('Tesseract.js not loaded');
if(!worker){worker=await Tesseract.createWorker('eng');try{worker.setProgressHandler(p=>{fill.style.width=Math.round((p.progress||0)*100)+'%'})}catch(e){}}
return worker}

function stopCam(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}}

function setReady(){
$result.classList.remove('show');$app.classList.remove('has-result');
list.innerHTML='';sentences=[];fill.style.width='0';
btnS.classList.add('hide');btnT.classList.add('hide');
btnC.classList.remove('hide');btnC.textContent='📷 Retake'}

btnC.addEventListener('click',async()=>{
stopCam();speechSynthesis.cancel();speaking=false;setReady();
btnC.classList.add('hide');
canvas.classList.add('hide');ph.classList.add('hide');video.classList.remove('hide');
try{
stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}});
video.srcObject=stream;st.textContent='Camera ready — tap Snap';btnS.classList.remove('hide')
}catch(e){
video.classList.add('hide');ph.classList.remove('hide');st.textContent='Camera error: '+e.message;btnC.classList.remove('hide')
}});

btnS.addEventListener('click',async()=>{
if(!stream)return;
const w=video.videoWidth||1280,h=video.videoHeight||720;
canvas.width=w;canvas.height=h;
canvas.getContext('2d').drawImage(video,0,0);
stopCam();video.classList.add('hide');canvas.classList.remove('hide');
btnS.classList.add('hide');fill.style.width='0';st.textContent='OCR running...';
try{
const w=await getWorker(),{data}=await w.recognize(canvas);
let raw=(data.text||'').trim();
if(!raw){st.textContent='No text found — Retake';btnC.classList.remove('hide');btnC.textContent='📷 Retake';return}
const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l.length>0);sentences=[];
for(const l of lines){const parts=l.split(/(?<=[.!?])\s+/);for(const p of parts){const t=p.trim();if(t)sentences.push(t)}}
if(!sentences.length)sentences=[raw];
list.innerHTML='';
sentences.forEach((s,i)=>{const d=document.createElement('div');d.className='row';d.innerHTML='<span class="idx">'+(i+1)+'</span><span>'+esc(s)+'</span>';list.appendChild(d)});
$result.classList.add('show');$app.classList.add('has-result');
btnT.classList.remove('hide');btnC.classList.remove('hide');btnC.textContent='📷 Retake';
st.textContent=sentences.length+' sentence'+(sentences.length>1?'s':'')+' found'
}catch(e){st.textContent='OCR failed: '+e.message;btnC.classList.remove('hide');btnC.textContent='📷 Retake'}
});

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

btnT.addEventListener('click',()=>{
if(speaking){speechSynthesis.cancel();speaking=false;btnT.disabled=false;btnT.innerHTML='🔊 Speak';st.textContent='Stopped';return}
if(!sentences.length)return;
speaking=true;btnT.disabled=true;btnT.innerHTML='⏹ Speaking...';
const q=[...sentences];
function next(){
if(!q.length){speaking=false;btnT.disabled=false;btnT.innerHTML='🔊 Speak';st.textContent='Done';return}
const s=q.shift();st.textContent='🔊 '+s.slice(0,60)+(s.length>60?'...':'');
const u=new SpeechSynthesisUtterance(s);u.lang='en-US';u.rate=.95;
u.onend=()=>setTimeout(next,120);
u.onerror=()=>{speaking=false;btnT.disabled=false;btnT.innerHTML='🔊 Speak';st.textContent='TTS error'};
speechSynthesis.speak(u)}
next()});

window.addEventListener('beforeunload',()=>{stopCam();speechSynthesis.cancel()});
</script>
</body>
</html>
